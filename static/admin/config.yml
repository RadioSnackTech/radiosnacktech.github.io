backend:
  branch: main
  name: github
  repo: RadioSnackTech/radiosnacktech.github.io
  base_url: https://netlify-oauth.jvns.ca
media_folder: "static/images/uploads" # Media files will be stored in the repo under static/images/uploads
site_url: https://radiosnack.ca
public_folder: "/images/uploads" # The src attribute for uploaded media will begin with /images/uploads
collections:
  - name: "events"
    label: "Event"
    folder: "_data/events"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    summary: "{{date | date('YYYY-MM-DD')}} - {{title}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Image", name: "image", widget: "image" }
      - { label: "Event URL", name: "url", widget: "string" }
  - name: "links"
    label: "Link"
    folder: "_data/links"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    summary: "{{text}}"
    fields:
      - { label: "Text", name: "text", widget: "string" }
      - { label: "URL", name: "url", widget: "string" }
      - { label: "Icon", name: "icon_url", widget: "image", required: false }
  - name: "equipment"
    label: "Equipment"
    folder: "_data/equipment"
    create: true
    slug: "{{name | slug}}"
    extension: "json"
    format: "json"
    summary: "{{name}}"
    fields:
      - { label: "Name", name: "name", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - label: "Images"
        name: "images"
        widget: "list"
        required: false
        fields:
          - { label: "Image", name: "url", widget: "image" }
          - { label: "Alt Text", name: "alt_text", widget: "string" }
      - { label: "Requires training?", name: "requires_training", widget: "boolean", default: false }
  - name: "pages"
    label: "Pages (English)"
    files:
      - { label: "Home", name: "index", file: "index.md", fields: [{ label: "Title", name: "title", widget: "string" }, { label: "Body", name: "body", widget: "markdown" }] }
      - { label: "News", name: "news", file: "news.md", fields: [{ label: "Title", name: "title", widget: "string" }, { label: "Body", name: "body", widget: "markdown" }] }
      - { label: "Membership", name: "membership", file: "membership.md", fields: [{ label: "Title", name: "title", widget: "string" }, { label: "Body", name: "body", widget: "markdown" }] }
      - { label: "Space", name: "space", file: "space.md", fields: [{ label: "Title", name: "title", widget: "string" }, { label: "Body", name: "body", widget: "markdown" }] }
  - name: "pages_fr"
    label: "Pages (Français)"
    files:
      - { label: "Accueil", name: "index", file: "fr/index.md", fields: [{ label: "Titre", name: "title", widget: "string" }, { label: "Contenu", name: "body", widget: "markdown" }] }
      - { label: "Actualités", name: "news", file: "fr/news.md", fields: [{ label: "Titre", name: "title", widget: "string" }, { label: "Contenu", name: "body", widget: "markdown" }] }
      - { label: "Adhésion", name: "membership", file: "fr/membership.md", fields: [{ label: "Titre", name: "title", widget: "string" }, { label: "Contenu", name: "body", widget: "markdown" }] }
      - { label: "Lieu", name: "space", file: "fr/space.md", fields: [{ label: "Titre", name: "title", widget: "string" }, { label: "Contenu", name: "body", widget: "markdown" }] }
